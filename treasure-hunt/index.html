;

<script>
function updateChallenges() {
  const now = new Date();

  document.querySelectorAll('.challenge').forEach(btn => {
    const row = btn.closest('.challenge-row');
    const timerEl = row.querySelector('.timer');

    const start = new Date(btn.dataset.start);
    const end = new Date(start.getTime() + 24 * 60 * 60 * 1000);

    if (now < start) {
      const diff = start - now;

      if (diff < 86400000) {
        const hours = Math.ceil(diff / (1000 * 60 * 60));
        timerEl.textContent = `Available in ${hours}h`;
      } else {
        const days = Math.ceil(diff / 86400000);
        timerEl.textContent = `Available in ${days} day${days > 1 ? 's' : ''}`;
      }

      row.classList.add('locked');
    } 
    else if (now >= start && now < end) {
      const diff = end - now;

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff / (1000 * 60)) % 60) .toString().padStart(2, '0');
      const seconds = Math.floor((diff / 1000) % 60) .toString().padStart(2, '0');

      timerEl.textContent = `${hours}h ${minutes}m ${seconds}s left`;

      row.classList.remove('locked');
    } 
    else {
      timerEl.textContent = "Submission closed";
      row.classList.add('locked');
    }
  });
}

setInterval(updateChallenges, 1000);
updateChallenges();
</script>

      (e.ctrlKey && e.shiftKey && e.key === "I") ||

});
